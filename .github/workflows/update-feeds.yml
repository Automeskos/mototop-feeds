name: Update Mototop feeds

on:
  workflow_dispatch:
  schedule:
    # Every day at 04:15 UTC (07:15 Lithuania summer time / 06:15 winter time)
    - cron: "15 4 * * *"

permissions:
  contents: write

concurrency:
  group: mototop-feed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download and split Mototop feed
        env:
          MOTOTOP_FEED_URL: ${{ secrets.MOTOTOP_FEED_URL }}
        run: python src/split_feed.py

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/*.xml feeds/feed-info.json
          if git diff --cached --quiet; then
            echo "No feed changes."
          else
            git commit -m "Update Mototop feeds"
            git push
          fi
