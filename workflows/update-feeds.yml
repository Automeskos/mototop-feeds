name: Update Mototop feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"
      timezone: "Europe/Vilnius"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build filtered XML feeds
        env:
          MOTOTOP_FEED_URL: ${{ secrets.MOTOTOP_FEED_URL }}
          OUTPUT_DIR: public
        run: python src/build_feeds.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
